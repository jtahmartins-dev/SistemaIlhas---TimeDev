databases:
  - name: sistema-ilhas-db
    plan: free
    databaseName: sistema_ilhas
    user: sistema_ilhas

services:
  - type: web
    name: sistema-ilhas-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: "./uploads"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-ilhas-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # você preenche manualmente no painel depois do deploy do Vercel
