<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .row { display: flex; align-items: flex-end; gap: 10px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: linear-gradient(180deg, #f97316, #fb923c); border-radius: 10px 10px 4px 4px; width: 36px; box-shadow: 0 4px 12px -4px rgba(249,115,22,0.5); }
  .name { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--ink-1); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="step"><div class="bar" style="height:4px"></div><div class="name">1</div><div class="px">4</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="name">2</div><div class="px">8</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="name">3</div><div class="px">12</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="name">4</div><div class="px">16</div></div>
    <div class="step"><div class="bar" style="height:22px"></div><div class="name">5</div><div class="px">22</div></div>
    <div class="step"><div class="bar" style="height:28px"></div><div class="name">6</div><div class="px">28</div></div>
    <div class="step"><div class="bar" style="height:36px"></div><div class="name">7</div><div class="px">36</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="name">8</div><div class="px">48</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="name">9</div><div class="px">64</div></div>
  </div>
</div>
</body>
</html>
