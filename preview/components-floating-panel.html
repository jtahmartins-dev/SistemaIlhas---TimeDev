<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 30px; }
  .modal { width: 100%; padding: 26px 28px; border-radius: 36px; background: rgba(255,255,255,0.72); backdrop-filter: blur(28px) saturate(140%); -webkit-backdrop-filter: blur(28px) saturate(140%); border: 1px solid var(--glass-stroke); box-shadow: var(--shadow-xl), var(--inset-top); position: relative; }
  .close { position: absolute; top: 18px; right: 18px; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--glass-stroke); background: rgba(255,255,255,0.7); color: var(--ink-2); font-size: 13px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  h3 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.01em; }
  .sub { margin: 4px 0 12px; font-family: var(--font-body); font-size: 13px; color: var(--ink-2); }
  .micro { font-family: var(--font-body); font-size: 10px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .mem { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 999px; background: rgba(255,255,255,0.7); border: 1px solid var(--glass-stroke); font-family: var(--font-body); font-size: 12px; color: var(--ink-1); }
  .chip .role { color: var(--ink-3); font-size: 10.5px; }
  .pill { display: inline-block; font-family: var(--font-body); font-size: 9.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.06em; background: rgba(249,115,22,0.18); color: #c2410c; margin-left: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="card">
  <div class="modal">
    <button class="close">✕</button>
    <h3>Ilha Design</h3>
    <p class="sub">Onde os protótipos nascem e são validados antes do desenvolvimento.</p>
    <div class="micro">Pessoas atribuídas</div>
    <div class="mem">
      <span class="chip"><strong>Marina Silva</strong><span class="role">· Líder de Design</span></span>
      <span class="chip"><strong>João Pedro</strong><span class="role">· Designer</span></span>
    </div>
    <div class="micro" style="margin-top:16px;">Estado nesta demanda</div>
    <div style="font-family:var(--font-body); font-size:13px; color:var(--ink-1);"><strong>Login social com Google</strong><span class="pill">em andamento</span></div>
  </div>
</div>
</body>
</html>
