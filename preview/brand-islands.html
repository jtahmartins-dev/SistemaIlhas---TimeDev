<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 12px 8px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; align-items: end; }
  .island { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
  .island img { width: 100%; height: 120px; object-fit: contain; position: relative; z-index: 1; }
  .island .glow { position: absolute; inset: 30px 8% 18px 8%; border-radius: 50%; filter: blur(18px); z-index: 0; opacity: 0.7; }
  .name { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--ink-1); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="island"><div class="glow" style="background:#a78bfa"></div><img src="../assets/islands/bruna.png" alt=""><span class="name">Bruna</span></div>
    <div class="island"><div class="glow" style="background:#22d3ee"></div><img src="../assets/islands/design.png" alt=""><span class="name">Design</span></div>
    <div class="island"><div class="glow" style="background:#3b82f6"></div><img src="../assets/islands/dev_a.png" alt=""><span class="name">Dev A</span></div>
    <div class="island"><div class="glow" style="background:#6366f1"></div><img src="../assets/islands/dev_b.png" alt=""><span class="name">Dev B</span></div>
    <div class="island"><div class="glow" style="background:#f59e0b"></div><img src="../assets/islands/integracao.png" alt=""><span class="name">Integração</span></div>
  </div>
</div>
</body>
</html>
