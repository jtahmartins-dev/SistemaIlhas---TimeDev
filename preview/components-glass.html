<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 28px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .panel-sm { padding: 14px 18px; }
  .panel-md { padding: 18px 22px; }
  .panel-xl { padding: 22px 26px; border-radius: 36px; }
  h3 { margin: 0; font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--ink-1); }
  p { margin: 4px 0 0; font-family: var(--font-body); font-size: 12px; color: var(--ink-2); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="glass panel-sm">
      <h3>Glass · padrão</h3>
      <p>radius 28 · shadow-lg · blur 24px · backdrop saturate 140%</p>
    </div>
    <div class="glass-xl panel-xl">
      <h3>Glass-xl · modal / janela flutuante</h3>
      <p>radius 36 · shadow-xl · 72% white · borda branca highlight</p>
      <div class="meta" style="margin-top:8px;">use em qualquer coisa que "flutua" sobre o céu</div>
    </div>
  </div>
</div>
</body>
</html>
