<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 28px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-body); font-size: 13px; font-weight: 600; padding: 11px 20px; border-radius: 22px; border: none; cursor: pointer; transition: all 180ms cubic-bezier(0.2,0.8,0.2,1); }
  .btn-primary { background: #f97316; color: #fff; box-shadow: var(--shadow-coral); }
  .btn-primary:hover { background: #fb923c; transform: translateY(-1px); }
  .btn-primary-press { background: #ea580c; transform: scale(0.98); color: #fff; }
  .btn-ghost { background: rgba(255,255,255,0.7); color: var(--ink-1); border: 1px solid rgba(249,115,22,0.4); }
  .btn-ghost:hover { background: rgba(255,255,255,0.9); }
  .btn-quiet { background: transparent; color: var(--ink-2); border: 1px solid rgba(7,89,133,0.15); }
  .btn-disabled { background: #f97316; color: #fff; opacity: 0.5; cursor: not-allowed; }
  .btn-tiny { font-size: 11px; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,0.7); color: var(--ink-1); border: 1px solid var(--glass-stroke); }
  .label { margin-bottom: 6px; font-family: var(--font-body); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); font-weight: 600; }
  .group { margin-bottom: 14px; }
  .group:last-child { margin-bottom: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="label">primária — destaque coral</div>
    <div class="row">
      <button class="btn btn-primary">+ Criar</button>
      <button class="btn btn-primary" style="background:#fb923c; transform:translateY(-1px);">+ Criar <span style="opacity:.7;">hover</span></button>
      <button class="btn btn-primary-press">+ Criar <span style="opacity:.7;">press</span></button>
      <button class="btn btn-disabled">Criando…</button>
    </div>
  </div>
  <div class="group">
    <div class="label">secundárias e ghost</div>
    <div class="row">
      <button class="btn btn-ghost">Cancelar</button>
      <button class="btn btn-quiet">Limpar seleção</button>
      <button class="btn btn-tiny">+ Adicionar link</button>
    </div>
  </div>
</div>
</body>
</html>
