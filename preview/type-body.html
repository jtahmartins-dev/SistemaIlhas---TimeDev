<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .label { margin-bottom: 8px; }
  .body { font-family: var(--font-body); color: var(--ink-1); }
  .row { display: flex; gap: 14px; align-items: baseline; margin-top: 6px; }
  .row strong { font-weight: 700; }
  .row em { font-style: italic; color: var(--ink-2); }
  p { margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Body · Inter 400 / 500 / 600 / 700</div>
  <p class="body" style="font-size:14px; line-height:1.5;">Logada como Bruna, crie uma demanda no dashboard, abra a ilha <strong>Bruna</strong>, anexe link ou arquivo, e dê <strong>check-in</strong>. A ilha Design ativa em seguida.</p>
  <div class="row" style="margin-top:14px;">
    <span class="body" style="font-size:13px; color:var(--ink-3); font-family:var(--font-mono);">Aa</span>
    <span class="body" style="font-size:14px;">Regular 400</span>
    <span class="body" style="font-size:14px; font-weight:500;">Medium 500</span>
    <span class="body" style="font-size:14px; font-weight:600;">Semibold 600</span>
    <span class="body" style="font-size:14px; font-weight:700;">Bold 700</span>
    <em class="body">italic</em>
  </div>
</div>
</body>
</html>
