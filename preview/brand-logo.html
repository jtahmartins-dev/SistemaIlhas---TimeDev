<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 32px 30px; display: flex; align-items: center; gap: 32px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #f97316; box-shadow: 0 0 18px rgba(249,115,22,0.65); }
  .word { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.01em; }
  .small .dot { width: 8px; height: 8px; box-shadow: 0 0 14px rgba(249,115,22,0.7); }
  .small .word { font-size: 14px; color: var(--ink-2); letter-spacing: 0.02em; font-weight: 600; }
  .divider { width: 1px; height: 56px; background: rgba(7,89,133,0.15); }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="dot"></span>
    <span class="word">Sistema de Ilhas</span>
  </div>
  <div class="divider"></div>
  <div class="brand small">
    <span class="dot"></span>
    <span class="word">Sistema de Ilhas</span>
  </div>
</div>
</body>
</html>
